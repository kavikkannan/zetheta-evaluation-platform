services:
  postgres:
    image: postgres:15-alpine
    container_name: zetheta-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zetheta}
      POSTGRES_USER: ${POSTGRES_USER:-zetheta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zetheta}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zetheta-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    container_name: zetheta-api-gateway
    ports:
      - "${API_GATEWAY_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://zetheta:zetheta@postgres:5432/zetheta}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/run/secrets/jwt_public_key.pem}
      JWT_ISSUER: ${JWT_ISSUER:-https://zetheta.com}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-assessment-engine}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./secrets:/run/secrets:ro

  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    container_name: zetheta-auth-service
    ports:
      - "${AUTH_SERVICE_PORT:-3002}:3002"
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://zetheta:zetheta@postgres:5432/zetheta}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/run/secrets/jwt_private_key.pem}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/run/secrets/jwt_public_key.pem}
      JWT_ISSUER: ${JWT_ISSUER:-https://zetheta.com}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-assessment-engine}
    volumes:
      - ./secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  evaluation-worker:
    build:
      context: .
      dockerfile: ./services/evaluation-worker/Dockerfile
    container_name: zetheta-evaluation-worker
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://zetheta:zetheta@postgres:5432/zetheta}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  websocket-server:
    build:
      context: .
      dockerfile: ./services/websocket-server/Dockerfile
    container_name: zetheta-websocket-server
    ports:
      - "${WEBSOCKET_SERVER_PORT:-3003}:3003"
    environment:
      NODE_ENV: development
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      redis:
        condition: service_started

  candidate-portal:
    build:
      context: .
      dockerfile: ./apps/candidate-portal/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001/v1}
        NEXT_PUBLIC_ASSESSMENT_ENGINE_URL: ${NEXT_PUBLIC_ASSESSMENT_ENGINE_URL:-http://localhost:4002}
    container_name: zetheta-candidate-portal
    ports:
      - "${CANDIDATE_PORTAL_PORT:-4001}:4001"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001/v1}
      NEXT_PUBLIC_ASSESSMENT_ENGINE_URL: ${NEXT_PUBLIC_ASSESSMENT_ENGINE_URL:-http://localhost:4002}
    depends_on:
      api-gateway:
        condition: service_started
      auth-service:
        condition: service_started

  assessment-engine:
    build:
      context: .
      dockerfile: ./apps/assessment-engine/Dockerfile
    container_name: zetheta-assessment-engine
    ports:
      - "${ASSESSMENT_ENGINE_PORT:-4002}:4002"
    depends_on:
      api-gateway:
        condition: service_started
      auth-service:
        condition: service_started

  employer-dashboard:
    build:
      context: .
      dockerfile: ./apps/employer-dashboard/Dockerfile
    container_name: zetheta-employer-dashboard
    ports:
      - "${EMPLOYER_DASHBOARD_PORT:-4003}:4003"
    depends_on:
      api-gateway:
        condition: service_started
      websocket-server:
        condition: service_started

volumes:
  postgres_data:
  redis_data:


services:
  postgres:
    image: postgres:15-alpine
    container_name: zetheta-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zetheta}
      POSTGRES_USER: ${POSTGRES_USER:-zetheta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zetheta}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zetheta-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    container_name: zetheta-api-gateway
    ports:
      - "${API_GATEWAY_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
      INTERNAL_TOKEN_SECRET: ${INTERNAL_TOKEN_SECRET:-REPLACE_ME_PRODUCTION_SECRET_MIN_16_CHARS}
      DATABASE_URL: ${DATABASE_URL:-postgresql://zetheta:zetheta@postgres:5432/zetheta}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/run/secrets/jwt_public_key.pem}
      JWT_ISSUER: ${JWT_ISSUER:-https://zetheta.com}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-assessment-engine}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4001,http://localhost:4002,http://localhost:4003,http://127.0.0.1:4001,http://127.0.0.1:4002,http://127.0.0.1:4003}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./secrets:/run/secrets:ro

  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    container_name: zetheta-auth-service
    ports:
      - "${AUTH_SERVICE_PORT:-3002}:3002"
    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
      INTERNAL_TOKEN_SECRET: ${INTERNAL_TOKEN_SECRET:-REPLACE_ME_PRODUCTION_SECRET_MIN_16_CHARS}
      DATABASE_URL: ${DATABASE_URL:-postgresql://zetheta:zetheta@postgres:5432/zetheta}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/run/secrets/jwt_private_key.pem}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/run/secrets/jwt_public_key.pem}
      JWT_ISSUER: ${JWT_ISSUER:-https://zetheta.com}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-assessment-engine}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4001,http://localhost:4003,http://127.0.0.1:4001,http://127.0.0.1:4003}
    volumes:
      - ./secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  evaluation-worker:
    build:
      context: .
      dockerfile: ./services/evaluation-worker/Dockerfile
    container_name: zetheta-evaluation-worker
    environment:
      NODE_ENV: production
      INTERNAL_TOKEN_SECRET: ${INTERNAL_TOKEN_SECRET:-REPLACE_ME_PRODUCTION_SECRET_MIN_16_CHARS}
      DATABASE_URL: ${DATABASE_URL:-postgresql://zetheta:zetheta@postgres:5432/zetheta}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      BULLMQ_QUEUE_NAME: evaluation-queue
      WORKER_ID: worker-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  websocket-server:
    build:
      context: .
      dockerfile: ./services/websocket-server/Dockerfile
    container_name: zetheta-websocket-server
    ports:
      - "${WEBSOCKET_SERVER_PORT:-3003}:3003"
    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/run/secrets/jwt_public_key.pem}
      JWT_ISSUER: ${JWT_ISSUER:-https://zetheta.com}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-assessment-engine}
    volumes:
      - ./secrets:/run/secrets:ro
    depends_on:
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data:

